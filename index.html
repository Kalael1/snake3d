<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake.io 3D Multiplayer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="app"></div>

    <!-- HUD Layer -->
    <div id="ui-layer">
      <div id="score-card">
        <span class="label">SKOR</span>
        <span id="score" class="value">0</span>
      </div>

      <!-- Online Leaderboard -->
      <div id="leaderboard">
        <div class="lb-header">🏆 LİDERLİK TABLOSU</div>
        <ul id="lb-list">
          <li>1. Bekleniyor...</li>
        </ul>
      </div>

      <div id="controls-hint">
        💡 <span>Fare: Yönlendir</span> | <span>Sol Tık / Boşluk: Hızlan</span> | <span>Tekerlek: Zoom</span> | <span>ESC: Menü</span>
      </div>
    </div>

    <!-- Start / Game Over Overlay -->
    <div id="overlay">
      <div class="glass-card">
        <h1 class="game-title">SNAKE.IO <span class="accent">3D</span></h1>
        <p class="subtitle" id="overlay-desc">Gerçek zamanlı çok oyunculu (Multiplayer) arenaya katıl!</p>
        
        <div class="input-group">
          <input type="text" id="player-name" placeholder="Oyuncu Adınız..." maxlength="12" value="YılanOyuncusu">
        </div>

        <div id="final-score-box" class="hidden">
          <p>SON SKORUNUZ</p>
          <h2 id="final-score">0</h2>
        </div>

        <button id="start-btn" class="glow-button">ARENAYA KATIL</button>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
